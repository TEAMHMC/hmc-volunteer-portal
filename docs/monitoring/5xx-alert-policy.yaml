# Cloud Monitoring alert policy: 5xx error rate on the volunteer portal.
#
# Deploy with:
#   gcloud alpha monitoring policies create \
#     --policy-from-file=docs/monitoring/5xx-alert-policy.yaml \
#     --project=hmc-prod-473121
#
# After creation, add notification channels:
#   gcloud alpha monitoring policies update POLICY_ID \
#     --add-notification-channels=CHANNEL_ID

displayName: "Portal 5xx Error Rate"
combiner: OR
conditions:
  - displayName: "Cloud Run 5xx requests > 5 in 60s"
    conditionThreshold:
      filter: >
        resource.type = "cloud_run_revision"
        AND resource.labels.service_name = "hmc-volunteer-portal"
        AND metric.type = "run.googleapis.com/request_count"
        AND metric.labels.response_code_class = "5xx"
      aggregations:
        - alignmentPeriod: 60s
          perSeriesAligner: ALIGN_RATE
          crossSeriesReducer: REDUCE_SUM
          groupByFields:
            - resource.labels.service_name
      comparison: COMPARISON_GT
      thresholdValue: 5
      duration: 0s
      trigger:
        count: 1
alertStrategy:
  autoClose: 3600s
notificationChannels: []
documentation:
  displayName: "Portal 5xx spike -- check Cloud Run logs and recent deploys"
  content: |
    The hmc-volunteer-portal Cloud Run service is returning more than 5 HTTP 5xx
    responses per 60-second window.

    Immediate steps:
    1. Open Cloud Run logs in GCP console (project hmc-prod-473121, service hmc-volunteer-portal).
    2. Check the Cloud Build history for any deploy in the last 30 minutes.
    3. If a bad deploy is suspected, roll back with:
         gcloud run deploy hmc-volunteer-portal \
           --image gcr.io/hmc-prod-473121/hmc-volunteer-portal:PREVIOUS_SHA \
           --region us-central1
    4. Check Firestore and Secret Manager connectivity if no recent deploy.
